version: "3.9"

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: todo-server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=no-verify&schema=public
      PORT: 3000
      NODE_ENV: production
    networks:
      - app-network
    ports:
      - "3000:3000"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: todo-client
    restart: unless-stopped
    depends_on:
      - server
    networks:
      - app-network
    ports:
      - "80:80"

networks:
  app-network:
    driver: bridge
